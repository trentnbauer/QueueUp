name: squadqueue-dev

services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-squadqueue}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-squadqueue}
    volumes:
      # postgres:18's image switched to storing data in a major-version-namespaced subdirectory
      # under /var/lib/postgresql (e.g. /var/lib/postgresql/18/docker) instead of directly at
      # .../data - mounting a volume at the old .../data path makes the image refuse to start,
      # even on an empty volume, since that path is no longer where it looks for its data.
      - postgres:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-squadqueue}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres:
    driver: local
  redis:
    driver: local