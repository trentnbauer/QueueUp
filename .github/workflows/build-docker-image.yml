name: Build and Publish Docker Image

on:
  # Daily build — only actually builds/pushes if check-for-changes finds
  # commits since the last successful build (see the check-for-changes job
  # below), so this caps Docker image builds at once per 24h no matter how
  # many changes land on main in between. Midnight UTC.
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: {}

concurrency:
  # A manual dispatch and a scheduled run racing each other would both try
  # to move the docker-build-marker tag and push to the same image tags.
  group: build-docker-image
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  check-for-changes:
    # DISABLED while other repo changes are landing — remove this line to
    # re-enable (build-and-push depends on this job's outputs, so disabling
    # just this one is enough to disable the whole workflow).
    if: true
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      has_changes: ${{ steps.changelog.outputs.has_changes }}
      description: ${{ steps.changelog.outputs.description }}
      image_name: ${{ steps.image_name.outputs.image_name }}
      # vX.Y.Z (with the leading "v", matching the git tag) and the same value without it (the
      # more common convention for a Docker tag) - see the versioning step below.
      new_version: ${{ steps.changelog.outputs.new_version }}
      new_version_bare: ${{ steps.changelog.outputs.new_version_bare }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history + tags, needed to diff against the previous build's
          # marker tag.
          fetch-depth: 0

      # ghcr.io image refs must be lowercase, but github.repository preserves
      # the repo's actual casing (trentnbauer/QueueUp) - lowercase it once
      # here so every job downstream uses a ref Docker will accept.
      - name: Compute lowercase image name
        id: image_name
        run: echo "image_name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: List changes since the last build
        id: changelog
        # docker-build-marker is moved to HEAD at the end of every build that
        # actually runs (see build-and-push), so this always covers exactly
        # what's new since the image now on ghcr.io was built. No marker yet
        # (first-ever run) always counts as "has changes", to establish one.
        # A manual run always counts as "has changes" too, so workflow_dispatch
        # can force a rebuild for testing regardless of whether anything changed.
        run: |
          if git rev-parse -q --verify refs/tags/docker-build-marker >/dev/null; then
            RANGE="docker-build-marker..HEAD"
            HAS_MARKER=true
          else
            RANGE="$(git rev-list --max-parents=0 HEAD)..HEAD"
            HAS_MARKER=false
          fi

          COUNT=$(git rev-list --count "$RANGE" 2>/dev/null || echo 0)

          if [ "$HAS_MARKER" = true ] && [ "$COUNT" -eq 0 ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            HAS_CHANGES=false
          else
            HAS_CHANGES=true
          fi

          # Dev-facing form for the step summary, with hashes for traceability.
          MULTI=$(git log "$RANGE" --pretty=format:'- %s (%h)' | head -n 30)
          if [ -z "$MULTI" ]; then
            MULTI="No commits since the last image build."
          fi

          # End-user-facing form for the published image description: one bullet per PR title,
          # no hash - squash-merge commit subjects are already "<PR title> (#N)", so this is a
          # PR-title changelog without a second GitHub API round trip. OCI annotation values (unlike
          # a Docker LABEL) can safely hold literal newlines, so this is an actual bullet list, not
          # a semicolon-joined wall of text.
          BULLETS=$(git log "$RANGE" --pretty=format:'- %s' | head -n 30)
          if [ -z "$BULLETS" ]; then
            BULLETS="- No commits since the last image build."
          fi

          # Flags any commit in range with a proper Conventional Commits "BREAKING CHANGE:" footer
          # (anchored to the start of a line, with the colon, rather than a bare substring match -
          # a commit that merely *talks about* breaking changes in prose shouldn't false-positive
          # on itself) or a "!" before the type's colon (e.g. "feat!:") - the other standard
          # Conventional Commits way to flag one. Also doubles as this build's major/minor/patch
          # version bump signal below: a bare "fix:"/no-recognized-prefix commit (this repo's
          # history predates this convention, so most commits are the latter) is a patch, "feat:"
          # is a minor, either breaking-change form is a major - highest tier across every commit
          # in range wins, so one breaking commit outweighs any number of feature/fix commits
          # alongside it.
          BREAKING=""
          BUMP="patch"
          for commit_hash in $(git rev-list "$RANGE" 2>/dev/null); do
            SUBJECT=$(git log -1 --format='%s' "$commit_hash")
            if git log -1 --format='%B' "$commit_hash" | grep -qiE '^BREAKING CHANGE:' || echo "$SUBJECT" | grep -qE '^[a-z]+(\([^)]*\))?!:'; then
              BREAKING="${BREAKING}- $SUBJECT"$'\n'
              BUMP="major"
            elif [ "$BUMP" != "major" ] && echo "$SUBJECT" | grep -qE '^feat(\([^)]*\))?:'; then
              BUMP="minor"
            fi
          done

          DESCRIPTION="$BULLETS"
          if [ -n "$BREAKING" ]; then
            DESCRIPTION="${DESCRIPTION}"$'\n\n'"⚠️ Breaking changes:"$'\n'"${BREAKING}"
          fi
          # Keep it from growing unbounded.
          DESCRIPTION=$(echo "$DESCRIPTION" | cut -c1-2000)

          # Current version is the highest vX.Y.Z tag on file (this workflow is the only thing
          # that creates them - see "Tag this build's version" below), or v1.0.0 if none exists yet
          # (the one-time bootstrap for the first build under this scheme - not itself subject to
          # $BUMP, since applying a bump computed from this repo's *entire* prior history, which
          # predates the versioning scheme entirely, wouldn't mean anything).
          CURRENT_VERSION=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -1)
          if [ -z "$CURRENT_VERSION" ]; then
            NEW_VERSION="v1.0.0"
          else
            VERSION_NUM="${CURRENT_VERSION#v}"
            MAJOR=$(echo "$VERSION_NUM" | cut -d. -f1)
            MINOR=$(echo "$VERSION_NUM" | cut -d. -f2)
            PATCH=$(echo "$VERSION_NUM" | cut -d. -f3)
            case "$BUMP" in
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              patch) PATCH=$((PATCH + 1)) ;;
            esac
            NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "has_changes=$HAS_CHANGES" >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "new_version_bare=${NEW_VERSION#v}" >> "$GITHUB_OUTPUT"
          {
            echo "description<<EOF"
            echo "$DESCRIPTION"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Changes since the last image build"
            echo ""
            echo "$MULTI"
            echo ""
            echo "**Will build/push a new image:** $HAS_CHANGES"
            echo "**New version:** $NEW_VERSION (bump: $BUMP)"
          } >> "$GITHUB_STEP_SUMMARY"

  # Builds each platform on a runner that's actually that architecture, instead of one job doing
  # both via docker/setup-qemu-action - QEMU-emulated npm ci/tsc/vite build/esbuild (this Dockerfile
  # compiles TypeScript and runs a full Vite build inside the image) run several times slower than
  # native, which was the single biggest cost in this workflow. Each leg pushes its image by digest
  # only (no tags yet); `merge` below combines both digests into one multi-arch manifest and applies
  # the real tags to that.
  build:
    needs: check-for-changes
    if: needs.check-for-changes.outputs.has_changes == 'true'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            # GitHub-hosted native arm64 runner (no QEMU) - see
            # https://docs.github.com/actions/using-github-hosted-runners/about-github-hosted-runners/about-github-hosted-runners#standard-github-hosted-runners-for-public-repositories
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate changelog.json from merged PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: .github/scripts/generate-changelog.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sanitize platform for cache scope/artifact names
        id: platform
        run: echo "slug=${PLATFORM//\//-}" >> "$GITHUB_OUTPUT"
        env:
          PLATFORM: ${{ matrix.platform }}

      - name: Build and push image by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile.server
          platforms: ${{ matrix.platform }}
          # GitHub Actions cache backend, scoped per platform so the amd64 and arm64 legs don't
          # thrash each other's cache entries (their layers differ). `mode=max` also caches
          # intermediate build-stage layers (deps/build/prod-deps), not just the final image, so an
          # unrelated source change still reuses the `npm ci` layers from the last run.
          cache-from: type=gha,scope=${{ steps.platform.outputs.slug }}
          cache-to: type=gha,mode=max,scope=${{ steps.platform.outputs.slug }}
          build-args: |
            APP_VERSION=${{ needs.check-for-changes.outputs.new_version }}
            APP_SHA=${{ github.sha }}
          # No description label here (it used to duplicate the one below) - it never actually
          # reached ghcr.io's UI for a multi-arch image anyway (that reads the *index* annotation
          # applied in the merge job below, not a per-platform image's config label), and now that
          # the description is a real bullet list it can't safely go in a labels: block either way
          # (that input is newline-delimited, one label per line - a value containing its own
          # newlines would corrupt the parsing).
          outputs: type=image,name=${{ env.REGISTRY }}/${{ needs.check-for-changes.outputs.image_name }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ steps.platform.outputs.slug }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Combines the amd64 and arm64 images (pushed by digest above, untagged) into one multi-arch
  # manifest list and applies the real tags/labels to that - this is the step that actually makes
  # `docker pull ghcr.io/.../queueup:latest` transparently resolve to the right architecture.
  merge:
    needs: [check-for-changes, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute rolling major/major.minor tags
        id: rolling
        run: |
          VERSION="${{ needs.check-for-changes.outputs.new_version_bare }}"
          echo "major=$(echo "$VERSION" | cut -d. -f1)" >> "$GITHUB_OUTPUT"
          echo "major_minor=$(echo "$VERSION" | cut -d. -f1-2)" >> "$GITHUB_OUTPUT"

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ needs.check-for-changes.outputs.image_name }}
          # major.minor.patch (see check-for-changes' versioning step) plus the standard rolling
          # "major" and "major.minor" tags alongside it (e.g. 2, 2.1 alongside 2.1.3) - the usual
          # convention for pinning to "any patch within 2.1" or "any minor within 2" - computed
          # in the step above rather than left to metadata-action's own semver type, since that
          # expects a real git-tag-triggered build, not a version computed mid-workflow. This also
          # replaces the old bare-integer run_number tag that used to exist only so Renovate's
          # default `docker` versioning scheme had an ascending value to track - a real semver tag
          # now serves that purpose natively.
          tags: |
            type=raw,value=latest
            type=sha,format=short
            type=raw,value=${{ needs.check-for-changes.outputs.new_version_bare }}
            type=raw,value=${{ needs.check-for-changes.outputs.new_version }}
            type=raw,value=${{ steps.rolling.outputs.major }}
            type=raw,value=${{ steps.rolling.outputs.major_minor }}

      - name: Create and push multi-arch manifest
        working-directory: /tmp/digests
        # --annotation targets the index (the multi-arch manifest list itself, not any one
        # platform's manifest) - that's what ghcr.io's package page reads a multi-arch image's
        # description from. The `labels:` passed to build-push-action above only bakes the
        # description into each platform's image config, which ghcr.io does NOT read for a
        # multi-arch tag's description (its own UI says as much: "for multi-arch images, set a
        # value ... in the annotations field of the manifest") - so without this, the page always
        # showed "No description provided" despite the label being set correctly per-platform.
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            --annotation "index:org.opencontainers.image.description=$DESCRIPTION" \
            $(printf '${{ env.REGISTRY }}/${{ needs.check-for-changes.outputs.image_name }}@sha256:%s ' *)
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}
          DESCRIPTION: ${{ needs.check-for-changes.outputs.description }}

      - name: Inspect pushed manifest
        run: docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ needs.check-for-changes.outputs.image_name }}:latest

      - name: Tag this build's version
        # Unlike docker-build-marker above, a version tag is permanent and never moved once
        # created - it's the historical record check-for-changes' next run reads the highest of
        # (via `git tag -l 'v*.*.*' | sort -V | tail -1`) to compute the *next* bump from.
        run: |
          git tag ${{ needs.check-for-changes.outputs.new_version }}
          git push origin ${{ needs.check-for-changes.outputs.new_version }}

      - name: Move last-build marker to this commit
        run: |
          git tag -f docker-build-marker
          git push origin docker-build-marker --force
